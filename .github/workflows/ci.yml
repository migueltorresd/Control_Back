name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Lint · Build · Unit Tests · Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm toma la versión del campo packageManager de package.json
      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Audit (high+critical)
        run: pnpm audit --audit-level=high

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: control_produccion_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_DATABASE: control_produccion_test
      PORT: 3001
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ci_test_secret_32_chars_minimum_ok
      JWT_EXPIRES_IN: 8h
      UPLOADS_DIR: ./uploads

    steps:
      - uses: actions/checkout@v4

      # pnpm toma la versión del campo packageManager de package.json
      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run e2e tests
        run: pnpm test:e2e
